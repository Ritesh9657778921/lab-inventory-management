{% extends 'base.html' %}

{% block title %}Edit Chemical - Lab Inventory Management{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Edit Chemical</h2>
</div>

<div class="form-panel">
    <div id="alert-container"></div>
    <form id="chemical-form" action="{{ url_for('main.edit_chemical', chemical_id=chemical.id) }}" method="POST">
        <div class="form-group">
            <label for="name">Chemical Name</label>
            <input type="text" id="name" name="name" value="{{ chemical.name }}" required>
        </div>
        <div class="form-group">
            <label for="quantity">Quantity</label>
            <input type="number" step="0.01" id="quantity" name="quantity" value="{{ chemical.quantity }}" min="0" required>
        </div>
        <div class="form-group">
            <label for="unit">Unit</label>
            <input type="text" id="unit" name="unit" value="{{ chemical.unit }}" required>
        </div>
        <div class="form-group">
            <label for="expiry_date">Expiry Date</label>
            <input type="date" id="expiry_date" name="expiry_date" value="{{ chemical.expiry_date.isoformat() }}" required>
        </div>
        <div class="form-group">
            <label for="hazard_level">Hazard Level</label>
            <select id="hazard_level" name="hazard_level" required>
                <option value="Low" {% if chemical.hazard_level == 'Low' %}selected{% endif %}>Low</option>
                <option value="Medium" {% if chemical.hazard_level == 'Medium' %}selected{% endif %}>Medium</option>
                <option value="High" {% if chemical.hazard_level == 'High' %}selected{% endif %}>High</option>
                <option value="Flammable" {% if chemical.hazard_level == 'Flammable' %}selected{% endif %}>Flammable</option>
                <option value="Toxic" {% if chemical.hazard_level == 'Toxic' %}selected{% endif %}>Toxic</option>
                <option value="Corrosive" {% if chemical.hazard_level == 'Corrosive' %}selected{% endif %}>Corrosive</option>
            </select>
        </div>
        <div class="form-group">
            <label for="storage_location">Storage Location</label>
            <input type="text" id="storage_location" name="storage_location" value="{{ chemical.storage_location }}" required>
        </div>
        <button type="submit" class="btn btn-primary">Update Chemical</button>
        <a href="{{ url_for('main.chemicals') }}" class="btn btn-secondary">Back to Inventory</a>
    </form>
</div>
{% endblock %}
